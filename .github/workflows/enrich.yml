name: Enrich Jobs

on:
  # Run manually from the Actions tab whenever you want
  workflow_dispatch:
    inputs:
      enrich_limit:
        description: "Max records to enrich (leave blank for all)"
        required: false
        default: ""

  # Also run automatically every night at 2 AM UTC
  schedule:
    - cron: "0 2 * * *"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write # needed to commit results back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: extraction/requirements.txt

      - name: Install Python dependencies
        run: pip install -r extraction/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Write .env from secrets
        env:
          AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_FAST: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_FAST }}
          AZURE_OPENAI_DEPLOYMENT_BEST: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_BEST }}
        run: |
          printf 'AZURE_OPENAI_BASE_URL=%s\n'       "$AZURE_OPENAI_BASE_URL"       > extraction/.env
          printf 'AZURE_OPENAI_API_KEY=%s\n'        "$AZURE_OPENAI_API_KEY"        >> extraction/.env
          printf 'AZURE_OPENAI_DEPLOYMENT_FAST=%s\n' "$AZURE_OPENAI_DEPLOYMENT_FAST" >> extraction/.env
          printf 'AZURE_OPENAI_DEPLOYMENT_BEST=%s\n' "$AZURE_OPENAI_DEPLOYMENT_BEST" >> extraction/.env

      - name: Run enrichment pipeline
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.enrich_limit }}" ]; then
            LIMIT_ARG="--enrich-limit ${{ github.event.inputs.enrich_limit }}"
          fi
          python extraction/run_job_pipeline.py --no-simplify --no-gmail $LIMIT_ARG

      - name: Commit enriched results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extraction/data/jobs/master_jobs.jsonl \
                  extraction/data/jobs/master_jobs.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: enrich jobs [skip ci]"
          git push
